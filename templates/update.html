<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST">
        {% csrf_token %}
        <label>Task:</label><br>
        <input type="text" placeholder="Enter your task:" name='task' value="{{a.task}}"><br><br>
        <label>Deadline:</label><br>
        <input type="date" placeholder="Enter due date:"name='date' value="{{a.date}}"><br><br>
        <button>Submit</button>
    </form>
</body>
</html>
